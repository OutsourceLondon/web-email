{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Asap+Condensed:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Bree+Serif&family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap"
        rel="stylesheet">
    <title>Dashboard</title>
</head>

<body style="font-family: 'Roboto',sans-serif;" >
    <div class="w-full sticky top-0 z-50 bg-white ">
        <header class="text-gray-900 font-semibold border-b  w-full bg-white  shadow-sm ">
            <div class="container mx-auto flex flex-wrap p-5 flex-col md:flex-row items-center">
                <a href="/"  class="flex  font-medium items-center text-gray-900 mb-4 md:mb-0">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-linecap="round"
                        stroke-linejoin="round" stroke-width="2"
                        class="w-10 h-10 text-white p-2 bg-green-600 rounded-full" viewBox="0 0 24 24">
                        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path>
                    </svg>
                    <span class="ml-3 text-xl">LOGO</span>
                </a>
                <nav class="md:ml-auto flex flex-wrap items-center font-normal  justify-center">
                    <a href="/" class="mr-5 hover:text-green-600 cursor-pointer">Home</a>
                    <a href="/pricing" class="mr-5 hover:text-green-600 cursor-pointer">Pricing</a>
                    <a href="/dashboard" class="mr-5 hover:text-green-600 cursor-pointer">Dashboard</a>
                </nav>
                <button
                    class="inline-flex items-center bg-green-600 border-0 py-2 px-3 focus:outline-none hover:bg-green-700 rounded text-white mt-4 md:mt-0">
                    <a href="/signup">
                        Sign
                        up
                    </a>
                </button>
            </div>
        </header>
    </div>




    <div class="flex md:flex-row flex-col">
        <div class="w-full md:w-64 border-r h-full bg-white  md:fixed py-10">
            <div class="flex items-center px-3 gap-3">
                <div class="w-10 h-10 rounded-full border"><img src="../static/admin/img/images/image1.PNG" alt="Profile Image"></div>
                <div class="font-bold">Thandermail</div>
            </div>
            <div class="py-2 px-3  text-gray-800 bg-gray-100 cursor-pointer mt-5">Account</div>
            <div class="py-2 px-3 cursor-pointer ">Payments</div>
            <div class="py-2 px-3 text-gray-800 bg-gray-100 cursor-pointer ">Bulk Email</div>
            <div class="py-2 px-3 cursor-pointer ">Upload</div>
            <div class="py-2 px-3 text-gray-800 bg-gray-100 cursor-pointer ">Refresh</div>
            <div class="py-2 px-3 cursor-pointer">Save</div>

        </div>



        <div class="py-10 md:ml-64 w-full ">
            <div class="container px-5 w-full mx-auto  flex">
                <div class=" bg-white rounded-lg p-8 flex flex-col md:ml-auto w-full  relative z-10 ">
                    <h2 class="text-gray-900 text-lg mb-1 font-medium title-font">Send Email</h2>
                    <p class="leading-relaxed mb-5 text-gray-600">Post-ironic portland shabby chic echo park, banjo
                        fashion axe</p>

                   <form method="post" enctype="multipart/form-data">
                    
                    <div class="relative mb-4">
                        <label for="file" class="leading-7 text-sm text-gray-600">Upload Cvs File</label>
                        <input type="file" name="file" accept=".csv"
                            class="w-full bg-white rounded border border-gray-300 focus:border-green-600 focus:ring-2 focus:ring-green-600 text-base outline-none text-gray-700 py-1 px-3 leading-8 transition-colors duration-200 ease-in-out">
                    </div>
                    <div class="relative mb-4">
                        <label for="subject" class="leading-7 text-sm text-gray-600 text-green">Title/Subject</label>
                        <input type="subject" id="subject" name="subject"
                            class="w-full bg-white rounded border border-gray-300 focus:border-green-600 focus:ring-2 focus:ring-green-600 text-base outline-none text-gray-700 py-1 px-3 leading-8 transition-colors duration-200 ease-in-out">
                    </div>
                    <div class="relative mb-4">
                        <label for="message" class="leading-7 text-sm text-gray-600">Message</label>
                        <textarea id="message" name="message"
                            class="w-full bg-white rounded border border-gray-300 focus:border-green-600 focus:ring-2 focus:ring-green-600 h-32 text-base outline-none text-gray-700 py-1 px-3 resize-none leading-6 transition-colors duration-200 ease-in-out"></textarea>
                    </div>
                    <button
                        class="text-white bg-green-600 border-0 py-2 px-6 focus:outline-none hover:bg-green-500 rounded text-lg" name="submit">Confirm</button>
                   </form>
                    <p class="text-xs text-gray-500 mt-3">Chicharrones blog helvetica normcore iceland tousled brook
                        viral artisan.</p>
                </div>
            </div>
        </div>


    </div>


</body>

</html>
